sonar.projectKey=mechmanager-execution
sonar.projectName=mechmanager-execution
sonar.projectVersion=1.0

sonar.sources=.
sonar.exclusions=\
  **/cmd/api/main.go,\
  **/*_test.go,\
  **/vendor/**

sonar.tests=.
sonar.test.inclusions=**/*_test.go

sonar.go.coverage.reportPaths=coverage.out

sonar.coverage.exclusions=\
  **/cmd/api/main.go,\
  **/config/**,\
  **/infrastructure/output/**
