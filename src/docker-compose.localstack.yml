services:
  localstack:
    image: localstack/localstack:3.8
    ports:
      - "4566:4566"
    environment:
      - SERVICES=sqs,dynamodb
      - DEFAULT_REGION=us-east-1

  localstack-setup:
    image: amazon/aws-cli
    depends_on:
      - localstack
    environment:
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_DEFAULT_REGION=us-east-1
    entrypoint: >
      /bin/sh -c "
        sleep 5 &&
        aws --endpoint-url=http://localstack:4566 sqs create-queue --queue-name execution-queue &&
        aws --endpoint-url=http://localstack:4566 sqs create-queue --queue-name execution-complete &&
        aws --endpoint-url=http://localstack:4566 dynamodb create-table \
          --table-name executions \
          --attribute-definitions AttributeName=order_id,AttributeType=S \
          --key-schema AttributeName=order_id,KeyType=HASH \
          --billing-mode PAY_PER_REQUEST &&
        echo 'Filas e tabelas do Execution Service criadas!'
      "