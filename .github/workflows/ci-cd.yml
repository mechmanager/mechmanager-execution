name: CI/CD - MechManager - OS

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

env:
  GO_VERSION: "1.25.2"
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/mechmanager-execution
  NAMESPACE: mechmanager-execution
  AWS_REGION: us-east-1
  CLUSTER_NAME: mechmanager-execution

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  ci:
    name: CI - Build, Test, Docker Build/Push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      checks: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run unit tests with coverage
        working-directory: ./src
        run: |
          go test -coverprofile=coverage.out ./adapter/service
          # Ajusta os caminhos para incluir 'src/' no início
          sed -i 's#^adapter/#src/adapter/#' coverage.out
          go tool cover -func=coverage.out
          go tool cover -html=coverage.out -o coverage.html

      - name: Check coverage threshold (80%)
        working-directory: ./src
        run: |
          total=$(go tool cover -func=coverage.out | grep total | awk '{print substr($3, 1, length($3)-1)}')
          echo "Coverage: $total%"
          if (( $(echo "$total < 79" | bc -l) )); then
            echo "Coverage below 80%! Failing build."
            exit 1
          fi

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: src/coverage.html

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v2
        continue-on-error: true
        with:
          args: >
            -X
            -Dsonar.projectKey=mechmanager-execution
            -Dsonar.organization=mechmanager
            -Dsonar.sources=src/adapter/service
            -Dsonar.tests=src/adapter/service
            -Dsonar.test.inclusions=**/*_test.go
            -Dsonar.go.coverage.reportPaths=src/coverage.out
            -Dsonar.exclusions=**/vendor/**,**/features/**
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  cd:
    name: CD - Deploy to Kubernetes (EKS)
    needs: ci
    runs-on: ubuntu-latest

    if: >
      (github.event_name == 'workflow_dispatch') ||
      ((github.event_name == 'push') && (github.ref == 'refs/heads/main'))

    outputs:
      lb_hostname: ${{ steps.deploy.outputs.lb_hostname }}
      lb_url: ${{ steps.deploy.outputs.lb_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install awscli and kubectl
        run: |
          sudo apt-get update -y
          sudo apt-get install -y curl jq unzip
          curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o /tmp/awscliv2.zip
          unzip -q /tmp/awscliv2.zip -d /tmp
          sudo /tmp/aws/install -i /usr/local/aws-cli -b /usr/local/bin || true
          KUBECTL_VERSION=$(curl -L -s https://dl.k8s.io/release/stable.txt)
          curl -LO "https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/

      - name: Setup kubeconfig for EKS and validate
        id: kubeconfig
        run: |
          set -euo pipefail
          aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.CLUSTER_NAME }}
          echo "kubeconfig updated"
          echo "current-context: $(kubectl config current-context)"
          kubectl get nodes --no-headers -o wide || (kubectl config view && exit 1)

      - name: Ensure namespace exists
        run: |
          set -euo pipefail
          kubectl apply -f k8s/namespace.yaml

      - name: Ensure GHCR pull secret (create before deployment)
        env:
          NS: ${{ env.NAMESPACE }}
        run: |
          set -euo pipefail
          kubectl get namespace $NS || (echo "Namespace $NS missing" && exit 1)
          kubectl delete secret ghcr-cred -n $NS --ignore-not-found
          kubectl create secret docker-registry ghcr-cred \
            --docker-server=ghcr.io \
            --docker-username="${{ github.actor }}" \
            --docker-password="${{ secrets.GHCR_PAT }}" \
            --docker-email="ci@github.com" \
            -n $NS
          kubectl patch serviceaccount default -n $NS \
            -p '{"imagePullSecrets":[{"name":"ghcr-cred"}]}' || true

      - name: Render deployment manifest with real image tag and apply
        env:
          TAG: ${{ needs.ci.outputs.image_tag }}
          NS: ${{ env.NAMESPACE }}
        run: |
          set -euo pipefail
          # fail early if tag is empty
          if [ -z "${TAG:-}" ]; then
            echo "TAG is empty; aborting"
            exit 1
          fi

          # create a rendered copy so repo file is not modified permanently
          RENDERED="k8s/deployment.rendered.yaml"
          cp k8s/deployment.yaml "$RENDERED"

          # replace placeholder {{IMAGE_TAG}} with the real tag
          sed -i "s/{{IMAGE_TAG}}/${TAG}/g" "$RENDERED"

          # sanity check: ensure no placeholder remains
          if grep -q "{{IMAGE_TAG}}" "$RENDERED"; then
            echo "Placeholder {{IMAGE_TAG}} still present in $RENDERED; aborting"
            echo "Contents:"
            cat "$RENDERED"
            exit 1
          fi

          # apply the rendered deployment and other manifests
          kubectl apply -f "$RENDERED" -n "$NS"
          kubectl apply -f k8s/service.yaml -n "$NS" || true
          kubectl apply -f k8s/configmap.yaml -n "$NS" || true
          kubectl apply -f k8s/hpa.yaml -n "$NS" || true
          # apply secrets manifest if you manage other secrets via manifests
          kubectl apply -f k8s/secrets.yaml -n "$NS" || true

      - name: Update application image with retries, rollout check and LB smoke test
        id: deploy
        env:
          TAG: ${{ needs.ci.outputs.image_tag }}
          IMAGE: ${{ env.IMAGE_NAME }}
          NS: ${{ env.NAMESPACE }}
          SERVICE_LB: mechmanager-execution-api-lb
          PORT: 8080
        run: |
          set -euo pipefail

          log_debug() {
            echo "=== DEBUG ==="
            kubectl -n "$NS" get svc "$SERVICE_LB" -o wide || true
            kubectl -n "$NS" describe svc "$SERVICE_LB" || true
            kubectl -n "$NS" get pods -l app=mechmanager-execution,component=api -o wide || true
            kubectl -n "$NS" get events --sort-by='.lastTimestamp' | tail -n 50 || true
            echo "=== END DEBUG ==="
          }

          # ensure deployment exists before attempting set image
          if ! kubectl -n "$NS" get deployment mechmanager-execution-api >/dev/null 2>&1; then
            echo "Deployment mechmanager-execution-api not found in namespace $NS; aborting set image step"
            log_debug
            echo "lb_hostname=" >> $GITHUB_OUTPUT
            echo "lb_url=" >> $GITHUB_OUTPUT
            exit 1
          fi

          # apply image update (this is safe even if deployment was applied above)
          kubectl -n "$NS" set image deployment/mechmanager-execution-api api="$IMAGE:$TAG" --record || true

          # rollout with retries
          if ! kubectl -n "$NS" rollout status deployment/mechmanager-execution-api --timeout=180s; then
            echo "Rollout failed or timed out"
            kubectl -n "$NS" rollout restart deployment/mechmanager-execution-api || true
            if ! kubectl -n "$NS" rollout status deployment/mechmanager-execution-api --timeout=180s; then
              echo "Rollout still failing after restart"
              log_debug
              kubectl -n "$NS" rollout undo deployment/mechmanager-execution-api || true
              echo "lb_hostname=" >> $GITHUB_OUTPUT
              echo "lb_url=" >> $GITHUB_OUTPUT
              exit 1
            fi
          fi

          # wait for LoadBalancer hostname
          HOSTNAME=""
          for i in $(seq 1 60); do
            HOSTNAME=$(kubectl get svc "$SERVICE_LB" -n "$NS" -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || true)
            if [ -n "$HOSTNAME" ]; then
              echo "Found LB hostname: $HOSTNAME"
              break
            fi
            echo "Waiting for LoadBalancer hostname... ($i/60)"
            sleep 5
          done

          if [ -z "$HOSTNAME" ]; then
            echo "LoadBalancer hostname did not appear in time"
            log_debug
            echo "Running internal smoke test as fallback"
            kubectl run --rm -i --tty smoke-curl --image=radial/busyboxplus:curl -n "$NS" -- /bin/sh -c "curl -sS -o /dev/stdout -w '\nHTTP %{http_code}\n' --max-time 10 http://mechmanager-execution-api:8080/health" || true
            echo "lb_hostname=" >> $GITHUB_OUTPUT
            echo "lb_url=" >> $GITHUB_OUTPUT
            exit 1
          fi

          # print and export LB hostname and URL
          URL="http://$HOSTNAME:$PORT/health"
          echo "=== LoadBalancer Hostname ==="
          echo "$HOSTNAME"
          echo "=== LoadBalancer URL being requested ==="
          echo "$URL"

          echo "lb_hostname=$HOSTNAME" >> $GITHUB_OUTPUT
          echo "lb_url=$URL" >> $GITHUB_OUTPUT

          # retry loop with exponential backoff
          MAX_ATTEMPTS=5
          SLEEP=3
          for attempt in $(seq 1 $MAX_ATTEMPTS); do
            echo "Attempt $attempt: curl -sS -o /tmp/health_body -w '%{http_code}' --max-time 10 $URL"
            HTTP_CODE=$(curl -sS -o /tmp/health_body -w '%{http_code}' --max-time 10 "$URL" || echo "000")
            if [ "$HTTP_CODE" = "200" ]; then
              echo "Smoke test passed (200)"
              cat /tmp/health_body || true
              exit 0
            fi
            echo "Smoke test failed (HTTP $HTTP_CODE). Body:"
            cat /tmp/health_body || true
            echo "Sleeping $SLEEP seconds before retry"
            sleep $SLEEP
            SLEEP=$(( SLEEP * 2 ))
          done

          echo "Smoke test against LoadBalancer failed after $MAX_ATTEMPTS attempts"
          echo "Running internal smoke test to distinguish infra vs app"
          kubectl run --rm -i --tty smoke-curl --image=radial/busyboxplus:curl -n "$NS" -- /bin/sh -c "curl -sS -o /dev/stdout -w '\nHTTP %{http_code}\n' --max-time 10 http://mechmanager-execution-api:8080/health" || true

          echo "Collecting debug info"
          log_debug

          echo "Rolling back deployment"
          kubectl -n "$NS" rollout undo deployment/mechmanager-execution-api || true

          exit 1
