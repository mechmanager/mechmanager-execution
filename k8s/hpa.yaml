apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: mechmanager-execution-api-hpa
  namespace: mechmanager-execution
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: mechmanager-execution-api
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 10
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 0
    scaleDown:
      stabilizationWindowSeconds: 60
